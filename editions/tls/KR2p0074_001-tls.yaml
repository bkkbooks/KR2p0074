body:
  text: 顏淵問於孔子曰敢問君子之內事也有道乎孔子曰有顏淵𢽤敢問何如孔子曰敬羞柔宥過而先有司老老而慈幼豫絞舒繳而收貧祿不足則請有餘則辭敬羞柔宥過所以爲緩也先有司所以𠭁得情老老而慈幼所以處仁也豫絞而收貧所以取親也祿不足則請有餘則辭所以揚信也蓋君子之內事也如此矣𧧑顏淵曰君子之內事也回旣聞命矣𢽤敢問君子之內教也有道乎孔子曰有顏淵敢問何如孔子曰修身以先則民莫不從矣前以博愛則民莫遺親矣導之以儉則民知足矣前之以讓則民不爭矣或迪而教之能能賤不肖而遠之則民知禁矣如進者勸行退者知禁則其於教也不遠矣𧧑顏淵曰君子之內教也回旣聞矣敢問至名孔子曰德成則名至矣名至必卑身身治大則則大祿君子讓而得之小人爭而失之示則斤而毋欲得焉屰素遣行而信先處忠也貧而安樂先處
